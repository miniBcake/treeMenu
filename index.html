<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeMenu Library Examples</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .example-card {
            transition: transform 0.2s, shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .example-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
        .icon-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="fw-bold text-primary">
            <i class="bi bi-diagram-3-fill me-2"></i>TreeMenu.js
        </h1>
        <p class="text-muted">조직도 및 파일 시스템 트리 라이브러리 예제</p>
    </header>

    <div class="row g-4 justify-content-center">
        <div class="col-md-5">
            <a href="jsonTree.html" class="card h-100 border-0 shadow-sm example-card">
                <div class="card-body p-4">
                    <div class="icon-box bg-primary-soft text-primary mb-3" style="background-color: rgba(13, 110, 253, 0.1);">
                        <i class="bi bi-filetype-json fs-3"></i>
                    </div>
                    <h5 class="fw-bold">JSON 데이터 트리</h5>
                    <p class="text-muted small">
                        'otherNameExample.json' 파일을 한 번에 불러와 전체 조직도를 렌더링합니다.
                        소규모 조직도나 고정된 데이터를 다룰 때 적합합니다.
                    </p>
                    <div class="d-flex align-items-center text-primary mt-3 small fw-bold">
                        예제 보기 <i class="bi bi-arrow-right ms-1"></i>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-5">
            <a href="lazyLoading.html" class="card h-100 border-0 shadow-sm example-card">
                <div class="card-body p-4">
                    <div class="icon-box bg-warning-soft text-warning mb-3" style="background-color: rgba(255, 193, 7, 0.1);">
                        <i class="bi bi-cloud-download fs-3"></i>
                    </div>
                    <h5 class="fw-bold">지연 로딩 (LazyLoad)</h5>
                    <p class="text-muted small">
                        폴더를 클릭할 때마다 서버에서 하위 데이터를 비동기로 가져옵니다.
                        수만 명 이상의 대규모 조직도나 실시간 데이터 처리에 적합합니다.
                    </p>
                    <div class="d-flex align-items-center text-warning mt-3 small fw-bold">
                        예제 보기 <i class="bi bi-arrow-right ms-1"></i>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
